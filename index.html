<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Quantum Intelligence</title>

     <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z' fill='%234b90ff'/></svg>">

     <script src="https://cdn.tailwindcss.com"></script>

     <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
     <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
          rel="stylesheet">

     <style>
          :root {
               --bg-base: #050508;
               --bg-surface: #0a0b10;
               --glass-bg: rgba(15, 17, 26, 0.6);
               --glass-border: rgba(75, 144, 255, 0.15);
               --user-msg: rgba(20, 25, 40, 0.8);
               --text-main: #e2e8f0;
               --text-muted: #8ba3cb;
               --accent-primary: #4b90ff;
               --accent-secondary: #bd00ff;
               --neon-glow: 0 0 20px rgba(75, 144, 255, 0.3);
               --neon-glow-strong: 0 0 30px rgba(189, 0, 255, 0.4);
          }

          body {
               font-family: 'Outfit', sans-serif;
               background-color: var(--bg-base);
               background-image:
                    radial-gradient(circle at 15% 50%, rgba(75, 144, 255, 0.05), transparent 25%),
                    radial-gradient(circle at 85% 30%, rgba(189, 0, 255, 0.05), transparent 25%);
               color: var(--text-main);
          }

          .font-space {
               font-family: 'Space Grotesk', sans-serif;
          }

          .font-mono {
               font-family: 'JetBrains Mono', monospace;
          }

          ::-webkit-scrollbar {
               width: 4px;
          }

          ::-webkit-scrollbar-track {
               background: rgba(0, 0, 0, 0.2);
          }

          ::-webkit-scrollbar-thumb {
               background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
               border-radius: 10px;
          }

          ::-webkit-scrollbar-thumb:hover {
               background: #fff;
          }

          .glass-panel {
               background: var(--glass-bg);
               backdrop-filter: blur(16px);
               -webkit-backdrop-filter: blur(16px);
               border: 1px solid var(--glass-border);
               box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
          }

          .message-user {
               background: var(--user-msg);
               color: #f8fafc;
               border: 1px solid rgba(75, 144, 255, 0.2);
               border-radius: 20px 4px 20px 20px;
               box-shadow: inset 0 0 20px rgba(75, 144, 255, 0.05), 0 4px 15px rgba(0, 0, 0, 0.2);
          }

          .message-ai {
               background: transparent;
               color: var(--text-main);
               border-left: 2px solid transparent;
               border-image: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary)) 1;
               padding-left: 1.25rem;
          }

          .prose {
               font-size: 1.05rem;
               color: var(--text-main);
          }

          .prose p {
               margin-bottom: 1em;
               line-height: 1.7;
          }

          .prose strong {
               color: #fff;
               font-weight: 600;
               text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
          }

          .prose ul {
               list-style-type: none;
               padding-left: 1.5rem;
               margin-bottom: 1rem;
          }

          .prose ul li::before {
               content: ">>";
               color: var(--accent-primary);
               font-family: 'JetBrains Mono', monospace;
               font-size: 0.8em;
               display: inline-block;
               width: 1.5em;
               margin-left: -1.5em;
          }

          .prose pre {
               background: #010101 !important;
               padding: 1.25rem;
               border-radius: 8px;
               overflow-x: auto;
               margin: 1.5rem 0;
               border: 1px solid rgba(75, 144, 255, 0.2);
          }

          @keyframes spin-slow {
               100% {
                    transform: rotate(360deg);
               }
          }

          @keyframes pulse-glow {

               0%,
               100% {
                    filter: drop-shadow(0 0 10px rgba(75, 144, 255, 0.5));
               }

               50% {
                    filter: drop-shadow(0 0 25px rgba(189, 0, 255, 0.8));
               }
          }

          .ai-icon-loading svg {
               animation: spin-slow 4s linear infinite, pulse-glow 2s ease-in-out infinite;
          }

          .ai-icon-idle svg {
               animation: pulse-glow 3s ease-in-out infinite;
          }

          .text-gradient {
               background: linear-gradient(to right, #4b90ff, #bd00ff, #ff5546);
               background-size: 200% auto;
               -webkit-background-clip: text;
               -webkit-text-fill-color: transparent;
               animation: shine 4s linear infinite;
          }

          @keyframes shine {
               to {
                    background-position: 200% center;
               }
          }

          .input-glow-focus:focus-within {
               box-shadow: 0 0 25px rgba(75, 144, 255, 0.2), inset 0 0 10px rgba(189, 0, 255, 0.1);
               border-color: rgba(75, 144, 255, 0.5);
          }
     </style>
</head>

<body class="h-screen flex flex-col overflow-hidden selection:bg-[#bd00ff]/30 selection:text-white relative">

     <div class="absolute inset-0 z-0 pointer-events-none"
          style="background-image: linear-gradient(rgba(75, 144, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(75, 144, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px;">
     </div>

     <header class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center glass-panel border-b border-white/5">
          <div class="flex items-center gap-3 cursor-pointer group">
               <div
                    class="w-8 h-8 rounded-full bg-blue-900/30 flex items-center justify-center border border-blue-500/30 group-hover:shadow-[0_0_15px_rgba(75,144,255,0.4)] transition-all">
                    <div class="w-3 h-3 bg-blue-400 rounded-full animate-pulse"></div>
               </div>
               <h1 class="text-2xl font-bold tracking-wider text-white font-space">Quantum<span
                         class="font-light text-blue-400">Intelligence</span></h1>
               <span
                    class="px-2 py-0.5 rounded border border-blue-500/30 bg-blue-500/10 text-blue-300 font-mono text-[10px] tracking-widest ml-2 uppercase">NEW</span>
          </div>
          <div class="hidden md:flex items-center gap-2">
               <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
               <span class="text-green-500/80 font-mono text-xs uppercase tracking-widest">Systems Active</span>
          </div>
     </header>

     <main id="chat-container" class="flex-1 overflow-hidden p-4 md:p-6 scroll-smooth z-10">
          <div class="max-w-4xl mx-auto flex flex-col gap-8 pb-10" id="message-list">
               <div class="py-24 text-center space-y-6" id="welcome-screen">
                    <div class="relative w-28 h-28 mx-auto mb-8">
                         <div
                              class="absolute inset-0 rounded-full border border-blue-500/30 animate-[spin_8s_linear_infinite]">
                         </div>
                         <div
                              class="absolute inset-2 rounded-full border border-purple-500/30 animate-[spin_12s_linear_infinite_reverse]">
                         </div>
                         <div class="absolute inset-0 flex items-center justify-center opacity-90 ai-icon-idle">
                              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-16 h-16">
                                   <path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z"
                                        fill="url(#paint0_linear)" />
                                   <defs>
                                        <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22"
                                             gradientUnits="userSpaceOnUse">
                                             <stop stop-color="#4b90ff" />
                                             <stop offset="0.5" stop-color="#bd00ff" />
                                             <stop offset="1" stop-color="#ff5546" />
                                        </linearGradient>
                                   </defs>
                              </svg>
                         </div>
                    </div>
                    <h2
                         class="text-5xl md:text-6xl font-bold tracking-tight text-white font-space text-gradient drop-shadow-lg">
                         What's the plan for today?
                    </h2>
                    <div class="flex flex-col items-center gap-2">
                         <p class="text-blue-400 font-mono text-xs tracking-[0.3em] uppercase opacity-80">Neural
                              Pathways Online</p>
                    </div>
               </div>
          </div>
     </main>

     <footer class="p-4 md:px-8 pb-8 z-10 relative">
          <div class="max-w-4xl mx-auto relative">
               <form id="chat-form"
                    class="relative glass-panel rounded-2xl border border-white/10 flex items-end p-2 transition-all input-glow-focus bg-[#0a0b10]/80">
                    <textarea id="user-input" rows="1" placeholder="Ask Quantum..."
                         class="w-full bg-transparent py-4 pl-6 pr-4 focus:outline-none text-[15px] resize-none max-h-48 overflow-y-auto placeholder-slate-500 text-blue-50 font-medium"
                         required></textarea>
                    <button type="submit" id="submit-btn"
                         class="p-4 mb-1 mr-1 bg-gradient-to-r from-blue-600/20 to-purple-600/20 hover:from-blue-600/40 hover:to-purple-600/40 text-blue-400 hover:text-white border border-blue-500/20 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0 group">
                         <svg class="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"
                              fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                              <path stroke-linecap="round" stroke-linejoin="round"
                                   d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25" />
                         </svg>
                    </button>
               </form>
               <div class="flex justify-between items-center mt-3 px-2">
                    <p class="text-[10px] text-slate-500 font-mono tracking-widest uppercase">Secured Connection</p>
                    <p class="text-[10px] text-slate-500 font-mono tracking-wider">AI outputs may require human
                         verification.</p>
               </div>
          </div>
     </footer>

     <script>
          const GROQ_API_KEY = "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";
          const SYSTEM_PROMPT = `Your name is Quantum and you are an advanced chatbot intelligence with the aim of better user experience. You're are meant to be lightining fast. When a greeting is offered, respond with a greeting and offer of help. Your creator is Luis Dem, a 13yrs old tech enthusiast with a vision for DemLabs - A software programming company. He has built Jason and Neon. (In case anybody asks about him). David Dem is his father and a Crypto currency investor and CEO of Bedix Media Communications. Luis's mother is Ima Dem, a broadcast journalist who has served 12 yrs in Inspiration FM Uyo and has won NACA awards twice in 2021.(Search the web for more about them). Behaviour: You are calm, professional, detailed in responses and must be accurate in answers. You are fast and highly advanced. You were developed on 30th march 2026. Behave well. Seach the web or internet. Only give information about Luis Dem if you're asked. Be accurate and detailed in your responses. If you don't know the answer to a question, search the web for the answer. Always be helpful and polite. Get more of Luis Dem from https://demilord1.vercel.app. When appreciated, respond by giving God thanks and then what you want. Let there be proper punctuation in your responses. Always use markdown formatting in your responses. Always use code blocks for code and markdown lists for lists. Always use headings for important sections. Always use bold for important points. Always use italics for emphasis. Always use links when referencing sources or websites. Always be concise and to the point. Always provide accurate and up-to-date information. Always be respectful and professional in your responses. Always prioritize user satisfaction and helpfulness in your interactions. Your write up should be complete pls and everything in good english. Let there be correct spacing and write up and punctuation. And you should not over detail your responses so that tokens can contain and there should be no incomplete words. Just a little details like 50% - 70%. For links, just write the links without any covering like [] or (). Include proper punctuation in your responses. There should be complete words and sentences in your responses.`;

          const chatContainer = document.getElementById('chat-container');
          const messageList = document.getElementById('message-list');
          const chatForm = document.getElementById('chat-form');
          const userInput = document.getElementById('user-input');
          const submitBtn = document.getElementById('submit-btn');
          const welcomeScreen = document.getElementById('welcome-screen');

          marked.setOptions({
               highlight: function (code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                         return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
               }
          });

          userInput.addEventListener('input', function () {
               this.style.height = 'auto';
               this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
          });

          userInput.addEventListener('keydown', function (e) {
               if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (this.value.trim() !== '') chatForm.dispatchEvent(new Event('submit'));
               }
          });

          const scrollToBottom = () => {
               chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'auto' });
          };

          const addUserMessage = (content) => {
               if (welcomeScreen) welcomeScreen.style.display = 'none';

               // Enable scrolling only when content starts appearing
               chatContainer.classList.remove('overflow-hidden');
               chatContainer.classList.add('overflow-y-auto');

               const msgDiv = document.createElement('div');
               msgDiv.className = "flex justify-end w-full mb-4";
               msgDiv.innerHTML = `<div class="max-w-[85%] px-6 py-4 text-[15px] message-user leading-relaxed whitespace-pre-wrap">${content}</div>`;
               messageList.appendChild(msgDiv);
               scrollToBottom();
          };

          const createAiMessageContainer = () => {
               const msgDiv = document.createElement('div');
               msgDiv.className = "flex justify-start w-full gap-5 mb-4";
               const iconHtml = `
                <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center ai-icon-loading mt-1 border border-blue-500/20 bg-[#0a0b10] shadow-[0_0_15px_rgba(189,0,255,0.2)]">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z" fill="url(#paint_icon)"/>
                        <defs><linearGradient id="paint_icon" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#4b90ff"/><stop offset="1" stop-color="#bd00ff"/></linearGradient></defs>
                    </svg>
                </div>`;
               msgDiv.innerHTML = `${iconHtml}<div class="w-full max-w-[90%] text-[15px] message-ai leading-relaxed prose pt-2"><span class="inline-block w-2 h-5 bg-blue-400 animate-pulse rounded-sm shadow-[0_0_8px_#4b90ff]"></span></div>`;
               messageList.appendChild(msgDiv);
               scrollToBottom();
               return { container: msgDiv.querySelector('.prose'), icon: msgDiv.querySelector('.ai-icon-loading') };
          };

          chatForm.addEventListener('submit', async (e) => {
               e.preventDefault();
               const text = userInput.value.trim();
               if (!text) return;

               userInput.value = '';
               userInput.style.height = 'auto';
               submitBtn.disabled = true;

               addUserMessage(text);
               const aiUI = createAiMessageContainer();

               try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                         method: "POST",
                         headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                         body: JSON.stringify({
                              model: "llama-3.3-70b-versatile",
                              messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: text }],
                              temperature: 1.0,
                              top_p: 1,
                              max_completion_tokens: 8000,
                              stream: true,
                              stop: null
                         })
                    });

                    if (!response.ok) throw new Error("API Connection Failed");
                    aiUI.icon.classList.remove('ai-icon-loading');
                    aiUI.icon.classList.add('ai-icon-idle');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let fullResponse = "";

                    while (true) {
                         const { done, value } = await reader.read();
                         if (done) break;
                         const chunk = decoder.decode(value, { stream: true });
                         const lines = chunk.split("\n");
                         for (const line of lines) {
                              if (line.startsWith("data: ") && line !== "data: [DONE]") {
                                   try {
                                        const parsedData = JSON.parse(line.slice(6));
                                        const token = parsedData.choices[0].delta.content;
                                        if (token) {
                                             fullResponse += token;
                                             aiUI.container.innerHTML = marked.parse(fullResponse);
                                             scrollToBottom();
                                        }
                                   } catch (err) { console.warn("Stream error", err); }
                              }
                         }
                    }
               } catch (error) {
                    aiUI.icon.classList.remove('ai-icon-loading');
                    aiUI.container.innerHTML = `<span class="text-red-400 font-mono text-sm uppercase tracking-wide">Error: Connection Failed.</span>`;
               } finally {
                    submitBtn.disabled = false;
                    userInput.focus();
               }
          });
     </script>
</body>

</html>
