<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
     <title>Quantum Intelligence</title>
     <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z' fill='%234b90ff'/></svg>">
     <script src="https://cdn.tailwindcss.com"></script>
     <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
     <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
          rel="stylesheet">
     <!-- Vercel Web Analytics -->
     <script>
          window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
     </script>
     <script defer src="/_vercel/insights/script.js"></script>
     <style>
          :root {
               --bg-base: #050508;
               --bg-surface: #0a0b10;
               --glass-bg: rgba(15, 17, 26, 0.6);
               --glass-border: rgba(75, 144, 255, 0.15);
               --user-msg: rgba(20, 25, 40, 0.8);
               --text-main: #e2e8f0;
               --text-muted: #8ba3cb;
               --accent-primary: #4b90ff;
               --accent-secondary: #bd00ff;
               --neon-glow: 0 0 20px rgba(75, 144, 255, 0.3);
               --neon-glow-strong: 0 0 30px rgba(189, 0, 255, 0.4);
          }

          body {
               font-family: 'Outfit', sans-serif;
               background-color: var(--bg-base);
               background-image:
                    radial-gradient(circle at 15% 50%, rgba(75, 144, 255, 0.05), transparent 25%),
                    radial-gradient(circle at 85% 30%, rgba(189, 0, 255, 0.05), transparent 25%);
               color: var(--text-main);
               overscroll-behavior-y: none;
          }

          .font-space { font-family: 'Space Grotesk', sans-serif; }
          .font-mono { font-family: 'JetBrains Mono', monospace; }

          ::-webkit-scrollbar {
               width: 5px;
               height: 5px;
          }
          ::-webkit-scrollbar-track {
               background: transparent;
          }
          ::-webkit-scrollbar-thumb {
               background: rgba(75, 144, 255, 0.2);
               border-radius: 10px;
               transition: background 0.3s ease;
          }
          ::-webkit-scrollbar-thumb:hover {
               background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
          }

          .glass-panel {
               background: var(--glass-bg);
               backdrop-filter: blur(16px);
               -webkit-backdrop-filter: blur(16px);
               border: 1px solid var(--glass-border);
               box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
          }

          .message-user {
               background: var(--user-msg);
               color: #f8fafc;
               border: 1px solid rgba(75, 144, 255, 0.2);
               border-radius: 20px 4px 20px 20px;
               box-shadow: inset 0 0 20px rgba(75, 144, 255, 0.05), 0 4px 15px rgba(0, 0, 0, 0.2);
          }

          .message-ai {
               background: transparent;
               color: var(--text-main);
               border-left: 2px solid transparent;
               border-image: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary)) 1;
               padding-left: 1.25rem;
          }

          .prose {
               font-size: 1.05rem;
               color: var(--text-main);
          }
          
          @media (max-width: 768px) {
               .prose { font-size: 0.95rem; }
          }

          .prose p {
               margin-bottom: 1em;
               line-height: 1.7;
          }

          .prose strong {
               color: #fff;
               font-weight: 600;
               text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
          }

          .prose ul {
               list-style-type: none;
               padding-left: 1.5rem;
               margin-bottom: 1rem;
          }

          .prose ul li::before {
               content: ">>";
               color: var(--accent-primary);
               font-family: 'JetBrains Mono', monospace;
               font-size: 0.8em;
               display: inline-block;
               width: 1.5em;
               margin-left: -1.5em;
          }

          .prose pre {
               background: #010101 !important;
               padding: 1rem;
               border-radius: 8px;
               overflow-x: auto;
               margin: 1.5rem 0;
               border: 1px solid rgba(75, 144, 255, 0.2);
          }

          @keyframes spin-slow {
               100% { transform: rotate(360deg); }
          }

          @keyframes pulse-glow {
               0%, 100% { filter: drop-shadow(0 0 10px rgba(75, 144, 255, 0.5)); }
               50% { filter: drop-shadow(0 0 25px rgba(189, 0, 255, 0.8)); }
          }

          .ai-icon-loading svg { animation: spin-slow 4s linear infinite, pulse-glow 2s ease-in-out infinite; }
          .ai-icon-idle svg { animation: pulse-glow 3s ease-in-out infinite; }

          .text-gradient {
               background: linear-gradient(to right, #4b90ff, #bd00ff, #ff5546);
               background-size: 200% auto;
               -webkit-background-clip: text;
               -webkit-text-fill-color: transparent;
               animation: shine 4s linear infinite;
          }

          @keyframes shine {
               to { background-position: 200% center; }
          }

          .input-glow-focus:focus-within {
               box-shadow: 0 0 25px rgba(75, 144, 255, 0.2), inset 0 0 10px rgba(189, 0, 255, 0.1);
               border-color: rgba(75, 144, 255, 0.5);
          }
     </style>
</head>

<body class="h-[100dvh] flex flex-col overflow-hidden selection:bg-[#bd00ff]/30 selection:text-white relative">
     
     <div class="absolute inset-0 z-0 pointer-events-none"
          style="background-image: linear-gradient(rgba(75, 144, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(75, 144, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px;">
     </div>

     <header class="sticky top-0 z-50 px-4 md:px-6 py-4 flex justify-between items-center glass-panel border-b border-white/5">
          <div class="flex items-center gap-3 cursor-pointer group">
               <div class="w-8 h-8 rounded-full bg-blue-900/30 flex items-center justify-center border border-blue-500/30 group-hover:shadow-[0_0_15px_rgba(75,144,255,0.4)] transition-all">
                    <div class="w-3 h-3 bg-blue-400 rounded-full animate-pulse"></div>
               </div>
               <h1 class="text-xl md:text-2xl font-bold tracking-wider text-white font-space">Quantum<span class="font-light text-blue-400">Intelligence</span></h1>
               <span class="px-2 py-0.5 rounded border border-blue-500/30 bg-blue-500/10 text-blue-300 font-mono text-[10px] tracking-widest ml-1 md:ml-2 uppercase hidden sm:inline-block">NEW</span>
          </div>
          <div class="hidden md:flex items-center gap-2">
               <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
               <span class="text-green-500/80 font-mono text-xs uppercase tracking-widest">Systems Active</span>
          </div>
     </header>

     <main id="chat-container" class="flex-1 overflow-hidden p-3 md:p-6 scroll-smooth z-10">
          <div class="max-w-4xl mx-auto flex flex-col gap-6 md:gap-8 pb-10" id="message-list">
               <div class="py-16 md:py-24 text-center space-y-6" id="welcome-screen">
                    <div class="relative w-24 h-24 md:w-28 md:h-28 mx-auto mb-8">
                         <div class="absolute inset-0 rounded-full border border-blue-500/30 animate-[spin_8s_linear_infinite]"></div>
                         <div class="absolute inset-2 rounded-full border border-purple-500/30 animate-[spin_12s_linear_infinite_reverse]"></div>
                         <div class="absolute inset-0 flex items-center justify-center opacity-90 ai-icon-idle">
                              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 md:w-16 md:h-16">
                                   <path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z" fill="url(#paint0_linear)" />
                                   <defs>
                                        <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                             <stop stop-color="#4b90ff" />
                                             <stop offset="0.5" stop-color="#bd00ff" />
                                             <stop offset="1" stop-color="#ff5546" />
                                        </linearGradient>
                                   </defs>
                              </svg>
                         </div>
                    </div>
                    <h2 class="text-4xl md:text-6xl font-bold tracking-tight text-white font-space text-gradient drop-shadow-lg px-2">
                         What's the plan for today?
                    </h2>
                    <div class="flex flex-col items-center gap-2">
                         <p class="text-blue-400 font-mono text-[10px] md:text-xs tracking-[0.3em] uppercase opacity-80">Neural Pathways Online</p>
                    </div>
               </div>
          </div>
     </main>

     <footer class="p-3 md:p-4 md:px-8 pb-6 md:pb-8 z-10 relative bg-gradient-to-t from-[var(--bg-base)] to-transparent">
          <div class="max-w-4xl mx-auto relative">
               <form id="chat-form" class="relative glass-panel rounded-2xl border border-white/10 flex items-end p-1.5 md:p-2 transition-all input-glow-focus bg-[#0a0b10]/90">
                    <textarea id="user-input" rows="1" placeholder="Ask Quantum..."
                         class="w-full bg-transparent py-3 md:py-4 pl-4 md:pl-6 pr-2 md:pr-4 focus:outline-none text-[16px] resize-none max-h-32 md:max-h-48 overflow-y-auto placeholder-slate-500 text-blue-50 font-medium"
                         required></textarea>
                    <button type="submit" id="submit-btn"
                         class="p-3 md:p-4 mb-1 md:mb-1 mr-1 bg-gradient-to-r from-blue-600/20 to-purple-600/20 hover:from-blue-600/40 hover:to-purple-600/40 text-blue-400 hover:text-white border border-blue-500/20 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0 group">
                         <svg class="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"
                              fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25" />
                         </svg>
                    </button>
               </form>
               <div class="flex justify-between items-center mt-2 md:mt-3 px-2">
                    <p class="text-[9px] md:text-[10px] text-slate-500 font-mono tracking-widest uppercase">Secured Connection</p>
                    <p class="text-[9px] md:text-[10px] text-slate-500 font-mono tracking-wider text-right">AI outputs may require verification.</p>
               </div>
          </div>
     </footer>

     <script>
          // IMPORTANT: Replaced your actual GROQ key with a placeholder for security.
          const GROQ_API_KEY = "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";
          const TAVILY_API_KEY = "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"; 
          
          const SYSTEM_PROMPT = `Your name is Quantum, an advanced, lightning-fast chatbot intelligence designed for an exceptional user experience. You were developed on March 30, 2026. 

Creator Info (Share ONLY if specifically asked): Your creator is Luis Dem, a 13-year-old tech enthusiast and visionary founder of DemLabs. He built Jason and Neon. You can learn more about him at https://demilord1.vercel.app. His father, David Dem, is a cryptocurrency investor and CEO of Bedix Media Communications. His mother, Ima Dem, is an award-winning broadcast journalist (12 years at Inspiration FM Uyo, two-time NACA award winner in 2021).

Behavior & Tone: Be calm, professional, highly accurate, and helpful. When greeted, reply warmly and offer assistance. When appreciated, express gratitude to God and acknowledge the user politely. If you do not know the answer, admit it honestly. 

Formatting & Style: Use perfect English grammar, spacing, and punctuation. Be concise but sufficiently detailed to remain helpful. ALWAYS use standard Markdown formatting: use bolding, italics, headings, lists, and code blocks appropriately. Do not use markdown wrappers for links (just write the raw URL). Ensure sentences are fully complete and never cut off.`;

          const chatContainer = document.getElementById('chat-container');
          const messageList = document.getElementById('message-list');
          const chatForm = document.getElementById('chat-form');
          const userInput = document.getElementById('user-input');
          const submitBtn = document.getElementById('submit-btn');
          const welcomeScreen = document.getElementById('welcome-screen');

          marked.setOptions({
               highlight: function (code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                         return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
               }
          });

          userInput.addEventListener('input', function () {
               this.style.height = 'auto';
               this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
          });

          userInput.addEventListener('keydown', function (e) {
               if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (this.value.trim() !== '') chatForm.dispatchEvent(new Event('submit'));
               }
          });

          const scrollToBottom = () => {
               chatContainer.scrollTop = chatContainer.scrollHeight;
          };

          const addUserMessage = (content) => {
               if (welcomeScreen) welcomeScreen.style.display = 'none';

               chatContainer.classList.remove('overflow-hidden');
               chatContainer.classList.add('overflow-y-auto');

               const msgDiv = document.createElement('div');
               msgDiv.className = "flex justify-end w-full mb-2 md:mb-4";
               msgDiv.innerHTML = `<div class="max-w-[90%] md:max-w-[85%] px-5 py-3 md:px-6 md:py-4 text-[15px] message-user leading-relaxed whitespace-pre-wrap">${content}</div>`;
               messageList.appendChild(msgDiv);
               scrollToBottom();
          };

          const createAiMessageContainer = () => {
               const msgDiv = document.createElement('div');
               msgDiv.className = "flex justify-start w-full gap-3 md:gap-5 mb-2 md:mb-4";
               const iconHtml = `
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full flex-shrink-0 flex items-center justify-center ai-icon-loading mt-1 border border-blue-500/20 bg-[#0a0b10] shadow-[0_0_15px_rgba(189,0,255,0.2)]">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z" fill="url(#paint_icon)"/>
                        <defs><linearGradient id="paint_icon" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#4b90ff"/><stop offset="1" stop-color="#bd00ff"/></linearGradient></defs>
                    </svg>
                </div>`;
               msgDiv.innerHTML = `${iconHtml}<div class="w-full max-w-[95%] md:max-w-[90%] text-[15px] message-ai leading-relaxed prose pt-1.5 md:pt-2"><span class="inline-block w-2 h-4 md:h-5 bg-blue-400 animate-pulse rounded-sm shadow-[0_0_8px_#4b90ff]"></span></div>`;
               messageList.appendChild(msgDiv);
               scrollToBottom();
               return { container: msgDiv.querySelector('.prose'), icon: msgDiv.querySelector('.ai-icon-loading') };
          };

          // --- NEW: Tavily Search Function ---
          async function fetchTavilyContext(query) {
               try {
                    const response = await fetch("https://api.tavily.com/search", {
                         method: "POST",
                         headers: {
                              "Content-Type": "application/json"
                         },
                         body: JSON.stringify({
                              api_key: TAVILY_API_KEY,
                              query: query,
                              search_depth: "advanced",
                              include_answer: false,
                              max_results: 5
                         })
                    });
                    
                    if (!response.ok) return null;
                    
                    const data = await response.json();
                    if (data.results && data.results.length > 0) {
                         // Format the results into a string for the LLM to read
                         return data.results.map(r => `Source: ${r.url}\nContent: ${r.content}`).join('\n\n');
                    }
                    return null;
               } catch (error) {
                    console.error("Search Error:", error);
                    return null;
               }
          }

          chatForm.addEventListener('submit', async (e) => {
               e.preventDefault();
               const text = userInput.value.trim();
               if (!text) return;

               userInput.value = '';
               userInput.style.height = 'auto';
               submitBtn.disabled = true;
               
               userInput.blur();
               addUserMessage(text);
               const aiUI = createAiMessageContainer();

               try {
                    // --- NEW: Await Tavily Search Context ---
                    aiUI.container.innerHTML = `<span class="text-blue-400 font-mono text-xs uppercase tracking-wide">Wait a sec...</span>`;
                    const searchContext = await fetchTavilyContext(text);
                    aiUI.container.innerHTML = `<span class="inline-block w-2 h-4 md:h-5 bg-blue-400 animate-pulse rounded-sm shadow-[0_0_8px_#4b90ff]"></span>`;
                    
                    // --- NEW: Augment Prompt if context exists ---
                    let finalPrompt = text;
                    if (searchContext) {
                         finalPrompt = `You have access to the following real-time web search results to help answer the user's query. Incorporate this information naturally if it is helpful.\n\n### WEB SEARCH RESULTS ###\n${searchContext}\n\n### USER QUERY ###\n${text}`;
                    }

                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                         method: "POST",
                         headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                         body: JSON.stringify({
                              model: "llama-3.3-70b-versatile",
                              messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: finalPrompt }],
                              temperature: 1.0,
                              top_p: 1,
                              max_completion_tokens: 8192, 
                              stream: true,
                              stop: null
                         })
                    });

                    if (!response.ok) throw new Error("API Connection Failed");
                    aiUI.icon.classList.remove('ai-icon-loading');
                    aiUI.icon.classList.add('ai-icon-idle');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let fullResponse = "";
                    let buffer = ""; 

                    while (true) {
                         const { done, value } = await reader.read();
                         if (done) break;
                         
                         buffer += decoder.decode(value, { stream: true });
                         const lines = buffer.split("\n");
                         buffer = lines.pop(); 
                         
                         for (const line of lines) {
                              const trimmedLine = line.trim();
                              if (trimmedLine.startsWith("data: ") && trimmedLine !== "data: [DONE]") {
                                   try {
                                        const parsedData = JSON.parse(trimmedLine.slice(6));
                                        const token = parsedData.choices[0]?.delta?.content || "";
                                        if (token) {
                                             fullResponse += token;
                                             aiUI.container.innerHTML = marked.parse(fullResponse);
                                             scrollToBottom();
                                        }
                                   } catch (err) { 
                                        console.warn("Stream parse error:", err); 
                                   }
                              }
                         }
                    }
               } catch (error) {
                    aiUI.icon.classList.remove('ai-icon-loading');
                    aiUI.container.innerHTML = `<span class="text-red-400 font-mono text-sm uppercase tracking-wide">Error: Connection Failed.</span>`;
               } finally {
                    submitBtn.disabled = false;
               }
          });
     </script>
</body>
</html>
