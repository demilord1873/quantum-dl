<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Quantum Intelligence</title>
     <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z' fill='%234b90ff'/></svg>">
     <script src="https://cdn.tailwindcss.com"></script>
     <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
     <style>
          :root {
               --bg-base: #050508;
               --bg-surface: #0a0b10;
               --glass-bg: rgba(15, 17, 26, 0.6);
               --glass-border: rgba(75, 144, 255, 0.15);
               --user-msg: rgba(20, 25, 40, 0.8);
               --text-main: #e2e8f0;
               --text-muted: #8ba3cb;
               --accent-primary: #4b90ff;
               --accent-secondary: #bd00ff;
          }
          body { font-family: 'Outfit', sans-serif; background-color: var(--bg-base); color: var(--text-main); }
          .font-space { font-family: 'Space Grotesk', sans-serif; }
          .font-mono { font-family: 'JetBrains Mono', monospace; }
          .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }
          .message-user { background: var(--user-msg); border: 1px solid rgba(75, 144, 255, 0.2); border-radius: 20px 4px 20px 20px; }
          .message-ai { border-left: 2px solid transparent; border-image: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary)) 1; padding-left: 1.25rem; }
          .prose p { margin-bottom: 1em; line-height: 1.7; }
          .prose strong { color: #fff; font-weight: 600; }
          .text-gradient { background: linear-gradient(to right, #4b90ff, #bd00ff, #ff5546); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
          @keyframes spin-slow { 100% { transform: rotate(360deg); } }
          .ai-icon-loading svg { animation: spin-slow 4s linear infinite; }
     </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative">
     <header class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center glass-panel border-b border-white/5">
          <div class="flex items-center gap-3 cursor-pointer group">
               <h1 class="text-2xl font-bold tracking-wider text-white font-space">Quantum<span class="font-light text-blue-400">Intelligence</span></h1>
          </div>
          <div class="hidden md:flex items-center gap-2">
               <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
               <span class="text-green-500/80 font-mono text-xs uppercase tracking-widest">Systems Active</span>
          </div>
     </header>

     <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 scroll-smooth z-10">
          <div class="max-w-4xl mx-auto flex flex-col gap-8 pb-10" id="message-list">
               <div class="py-24 text-center space-y-6" id="welcome-screen">
                    <h2 class="text-5xl md:text-6xl font-bold tracking-tight text-white font-space text-gradient">What's the plan for today?</h2>
               </div>
          </div>
     </main>

     <footer class="p-4 md:px-8 pb-8 z-10 relative">
          <div class="max-w-4xl mx-auto relative">
               <form id="chat-form" class="relative glass-panel rounded-2xl border border-white/10 flex items-end p-2 bg-[#0a0b10]/80">
                    <textarea id="user-input" rows="1" placeholder="Ask Quantum..." class="w-full bg-transparent py-4 pl-6 pr-4 focus:outline-none text-[15px] resize-none max-h-48 text-blue-50" required></textarea>
                    <button type="submit" id="submit-btn" class="p-4 mb-1 mr-1 bg-blue-600/20 text-blue-400 border border-blue-500/20 rounded-xl hover:bg-blue-600/40 transition-all">
                         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25" /></svg>
                    </button>
               </form>
          </div>
     </footer>

     <script>
          const GROQ_API_KEY = "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";
          
          // REFINED SYSTEM PROMPT
          const SYSTEM_PROMPT = `You are Quantum, an advanced AI developed by DemLabs. 
          Goal: Provide high-speed, professional, and accurate responses.
          Identity: Created by Luis Dem (13-year-old tech founder of DemLabs). 
          Details: Luis built JASON and Neon. His father is David Dem (Crypto Investor, CEO Bedix Media). His mother is Ima Dem (Broadcast Journalist at Inspiration FM Uyo, 2x NACA Award winner 2021).
          
          CRITICAL RULES:
          1. COMPLETION: Finish every word and sentence. Do NOT stop mid-thought.
          2. ACCURACY: Never use placeholders like "N". If a fact is unknown, omit it or suggest searching.
          3. FORMATTING: Use clean Markdown (Headers, Bold, Lists). Use code blocks for code.
          4. LINKS: Provide links in raw format (e.g., https://demilord1.vercel.app).
          5. TONE: Calm, polite, and respectful. Use correct punctuation.
          6. CONCISENESS: Be detailed but direct. Avoid unnecessary filler to ensure the response stays within the token window.`;

          const chatContainer = document.getElementById('chat-container');
          const messageList = document.getElementById('message-list');
          const chatForm = document.getElementById('chat-form');
          const userInput = document.getElementById('user-input');
          const submitBtn = document.getElementById('submit-btn');
          const welcomeScreen = document.getElementById('welcome-screen');

          const scrollToBottom = () => { chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }); };

          chatForm.addEventListener('submit', async (e) => {
               e.preventDefault();
               const text = userInput.value.trim();
               if (!text) return;

               if (welcomeScreen) welcomeScreen.style.display = 'none';
               userInput.value = '';
               submitBtn.disabled = true;

               // Add User Message
               const uDiv = document.createElement('div');
               uDiv.className = "flex justify-end w-full mb-4";
               uDiv.innerHTML = `<div class="max-w-[85%] px-6 py-4 text-[15px] message-user leading-relaxed">${text}</div>`;
               messageList.appendChild(uDiv);

               // Add AI Container
               const aiDiv = document.createElement('div');
               aiDiv.className = "flex justify-start w-full gap-5 mb-4";
               aiDiv.innerHTML = `<div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center ai-icon-idle border border-blue-500/20 bg-[#0a0b10]">AI</div><div class="w-full max-w-[90%] text-[15px] message-ai prose pt-2"></div>`;
               messageList.appendChild(aiDiv);
               const responseContainer = aiDiv.querySelector('.prose');

               try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                         method: "POST",
                         headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                         body: JSON.stringify({
                              model: "llama-3.3-70b-versatile",
                              messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: text }],
                              temperature: 0.7, // Lower temperature for more accuracy
                              max_completion_tokens: 4096, // More than enough for a bio
                              stream: true
                         })
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = "";
                    let residual = ""; // Buffer to handle fragmented JSON lines

                    while (true) {
                         const { done, value } = await reader.read();
                         if (done) break;

                         const chunk = decoder.decode(value, { stream: true });
                         const lines = (residual + chunk).split('\n');
                         residual = lines.pop(); // Keep the last incomplete line

                         for (const line of lines) {
                              const trimmed = line.trim();
                              if (!trimmed || trimmed === "data: [DONE]") continue;
                              
                              const jsonStr = trimmed.replace(/^data: /, "");
                              try {
                                   const data = JSON.parse(jsonStr);
                                   const content = data.choices[0].delta.content;
                                   if (content) {
                                        fullText += content;
                                        responseContainer.innerHTML = marked.parse(fullText);
                                        scrollToBottom();
                                   }
                              } catch (e) { console.error("JSON Error", e); }
                         }
                    }
               } catch (error) {
                    responseContainer.innerHTML = "Connection Error.";
               } finally {
                    submitBtn.disabled = false;
               }
          });
     </script>
</body>
</html>
